name: Generate

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install rkan
        run: cargo binstall --no-confirm rkan

      - name: Run rkan generate
        env:
          GITHUB_TOKEN: ${{ secrets.RKAN_GH_TOKEN }}
        run: rkan generate -j 4

      - name: Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ckan/
          git diff --cached --quiet || git commit -m "chore: regenerate ckan metadata [skip ci]"
          git push